<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Explore — PR Analytics</title>
    <style>
      .explore-filters { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; margin: 14px 0; }
      .explore-field { display: grid; gap: 3px; font-size: 12px; color: #586574; }
      .explore-field input, .explore-field select { font-size: 13px; padding: 5px 7px; border: 1px solid #d6dee8; border-radius: 6px; }
      .explore-field input[type="checkbox"] { justify-self: start; width: 16px; height: 16px; }
      .explore-filters button { align-self: flex-end; padding: 7px 16px; border: 0; border-radius: 6px; background: #2563eb; color: #fff; font-size: 13px; font-weight: 650; cursor: pointer; }
      .explore-status { color: #586574; font-size: 13px; margin: 4px 0 0; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Explore</h1>
        <form id="filters" class="explore-filters" aria-label="フィルタ"></form>
        <p id="status" class="explore-status" role="status">読み込み中…</p>
      </header>
      <div id="results"></div>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
