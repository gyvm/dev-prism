name: 'PR Insights — Collect & Build Dashboard'
description: >-
  In one step: collect GitHub pull requests into a committed DuckDB warehouse
  (incremental, with on-demand history backfill) AND build the static Explore +
  Reports dashboard into dist/. Run inside a consumer repo that holds the config
  and the accumulating data/dwh; commit the DWH and deploy dist/ afterwards.
author: 'dev-prism'
branding:
  icon: 'git-pull-request'
  color: 'purple'

inputs:
  config:
    description: 'Path to config.toml, relative to the repo root.'
    required: false
    default: 'config.toml'
  dwh-dir:
    description: 'Directory for the committed DWH parquet files.'
    required: false
    default: 'data/dwh'
  from:
    description: >-
      Backfill history down to this date (YYYY-MM-DD), fetching only the
      uncovered older slice per repo. Omit for a normal incremental run.
    required: false
    default: ''
  base:
    description: >-
      Astro base path for the built site. "/" for a custom domain or Cloudflare
      Pages; "/<repo>/" for a GitHub Pages project page (otherwise every asset
      404s).
    required: false
    default: '/'
  site:
    description: 'Absolute site URL for canonical/OG links (optional).'
    required: false
    default: ''
  output-dir:
    description: 'Where to write the built site in the consumer workspace.'
    required: false
    default: 'dist'
  reports-config:
    description: 'Path to reports.toml; when set, frozen reports populate the gallery.'
    required: false
    default: ''
  github-token:
    description: >-
      Read-only PAT with access to the target repos, used by the collector
      (reads as GITHUB_TOKEN). Pass it here via `with:` — env set on the calling
      `uses:` step is NOT propagated into a composite action's run steps. For
      GitHub App auth, set GITHUB_APP_ID / GITHUB_APP_PRIVATE_KEY /
      GITHUB_APP_INSTALLATION_ID as job- or workflow-level env instead (those
      ARE shared with composite steps).
    required: false
    default: ''

# Composite (not Docker): a single action runs both the collector and the site
# build on the runner, sharing one `npm ci`. Because this action.yml lives at the
# engine repo ROOT, ${{ github.action_path }} resolves to the whole checked-out
# engine — so npm, src/web and the repo-root dist/ all resolve from there.
#
# Auth: the collector reads GITHUB_TOKEN (or the GITHUB_APP_* trio) from the
# environment. Step-level `env:` on a `uses:` step does NOT reach a composite's
# inner steps, so the PAT comes in as the `github-token` input (exported below);
# the GITHUB_APP_* trio works via job/workflow env (the shared env store).
#
# Note: this runs in the caller's job and sets its Node version to 24. Run it as
# the last build step before deploy if your job has other Node-version needs.
runs:
  using: 'composite'
  steps:
    - name: Set up Node 24
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        # No `cache: npm`: setup-node's cache globs the lockfile relative to
        # GITHUB_WORKSPACE (the consumer repo), but the engine's package-lock.json
        # lives under the action checkout in _actions/ — outside the workspace —
        # so the glob resolves nothing and setup-node fails the step with
        # "Some specified paths were not resolved, unable to cache dependencies."
        # The npm ci below runs fine uncached.

    # Full install (NOT --omit=dev): the site build needs astro, esbuild, react
    # and tailwind, all devDependencies. Assumes a linux-x64/arm64 glibc runner
    # (matches the duckdb prebuilt; GitHub-hosted ubuntu qualifies).
    - name: Install engine dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        set -euo pipefail
        echo "::group::npm ci (engine toolchain: duckdb, astro, tailwind, react)"
        npm ci
        echo "::endgroup::"
        echo "::notice title=dev-prism::Engine dependencies installed."

    # 1. Collect PRs and refresh the committed DWH (incremental; --from backfills).
    #    Inputs flow in via env (never interpolated into the script body) so a
    #    crafted value — e.g. a workflow_dispatch `from` — cannot inject shell.
    - name: Collect PRs and refresh DWH
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        CONFIG: ${{ inputs.config }}
        DWH_DIR: ${{ inputs.dwh-dir }}
        FROM: ${{ inputs.from }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        echo "::group::Collect PRs → DWH"
        # The `github-token` input is the reliable channel for the PAT (step-level
        # env on the caller's `uses:` step does not reach here). Trim it (a stray
        # space / trailing newline pasted into the Secrets UI must NOT count as a
        # token), then export when non-empty; otherwise leave any inherited
        # GITHUB_TOKEN / GITHUB_APP_* env.
        token="$(printf '%s' "${INPUT_GITHUB_TOKEN:-}" | tr -d '[:space:]')"
        if [ -n "$token" ]; then
          export GITHUB_TOKEN="$token"
        fi
        # App auth needs all three vars; a partial trio fails obscurely later, so
        # only treat it as "configured" when complete.
        have_app=0
        if [ -n "${GITHUB_APP_ID:-}" ] && [ -n "${GITHUB_APP_PRIVATE_KEY:-}" ] && [ -n "${GITHUB_APP_INSTALLATION_ID:-}" ]; then
          have_app=1
        fi
        if [ -z "${GITHUB_TOKEN:-}" ] && [ "$have_app" -eq 0 ]; then
          echo "::error title=dev-prism::No usable auth: pass a non-empty github-token input, or set ALL of GITHUB_APP_ID / GITHUB_APP_PRIVATE_KEY / GITHUB_APP_INSTALLATION_ID as job/workflow env."
          exit 1
        fi
        echo "▶ config=$GITHUB_WORKSPACE/$CONFIG  dwh-dir=$GITHUB_WORKSPACE/$DWH_DIR${FROM:+  from=$FROM}"
        args=(--config "$GITHUB_WORKSPACE/$CONFIG" --dwh-dir "$GITHUB_WORKSPACE/$DWH_DIR")
        if [ -n "$FROM" ]; then
          echo "▶ Backfill mode: collecting history down to $FROM"
          args+=(--from "$FROM")
        else
          echo "▶ Incremental mode: collecting since the committed DWH cursor"
        fi
        npm run dwh:build -- "${args[@]}"
        echo "::endgroup::"
        echo "::notice title=dev-prism::DWH refreshed at $DWH_DIR."

    # 2. Copy the consumer's committed parquet into the site's public dir.
    - name: Stage DWH data for the site
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        DWH_DIR: ${{ inputs.dwh-dir }}
      run: |
        set -euo pipefail
        echo "::group::Stage Explore data (parquet → site public dir)"
        npm run explore:data -- --dwh-dir "$GITHUB_WORKSPACE/$DWH_DIR"
        echo "::endgroup::"
        echo "::notice title=dev-prism::Explore data staged."

    # 3. Optional: render frozen reports so the gallery is populated.
    - name: Render frozen reports
      if: ${{ inputs.reports-config != '' }}
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        REPORTS_CONFIG: ${{ inputs.reports-config }}
        DWH_DIR: ${{ inputs.dwh-dir }}
      run: |
        set -euo pipefail
        echo "::group::Render reports from $REPORTS_CONFIG"
        npm run report:dwh -- \
          --reports-config "$GITHUB_WORKSPACE/$REPORTS_CONFIG" \
          --dwh-dir "$GITHUB_WORKSPACE/$DWH_DIR" \
          --reports-dir dist/reports
        echo "::endgroup::"
        echo "::notice title=dev-prism::Frozen reports rendered."

    # 4. Build the Astro site directly (the web:build npm script hardcodes a base,
    #    so we invoke astro with the caller's base/site instead). outDir is the
    #    repo-root dist/ (see src/web/astro.config.mjs).
    - name: Build dashboard site
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        ASTRO_BASE: ${{ inputs.base }}
        ASTRO_SITE: ${{ inputs.site }}
      run: |
        set -euo pipefail
        echo "::group::Build navigation bundle (esbuild)"
        npm run build:nav
        echo "::endgroup::"
        echo "::group::Astro build (base=${ASTRO_BASE})"
        ./node_modules/.bin/astro build --root src/web
        echo "::endgroup::"
        echo "::notice title=dev-prism::Dashboard built into dist/."

    # 5. Hand the built site back to the consumer workspace (dist/. copies the
    #    contents, avoiding a dist/dist nesting).
    - name: Export dist to workspace
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        OUTPUT_DIR: ${{ inputs.output-dir }}
      run: |
        set -euo pipefail
        out="$GITHUB_WORKSPACE/$OUTPUT_DIR"
        echo "::group::Copy dist → $out"
        mkdir -p "$out"
        # Guard the local-action edge case (`uses: ./` with default output-dir):
        # then `out` IS the dist/ we just built, and `cp dist/. dist/` would nest.
        if [ "$out" -ef "$PWD/dist" ]; then
          echo "▶ output-dir already points at the built dist/ — nothing to copy"
        else
          cp -r dist/. "$out/"
        fi
        files=$(find "$out" -type f | wc -l | tr -d ' ')
        echo "▶ $files files written to $OUTPUT_DIR/"
        echo "::endgroup::"
        # A collection failure (rate limit or per-repo error) already exits 1 in
        # step 1 and aborts the action under `set -e` — it never reaches here. This
        # guard catches the other empty case: a *successful* collect over an empty
        # repo set (or repos with no PRs in range) writes no parquet, yielding a
        # built-but-dataless site. Refuse to report success then — otherwise a
        # consumer deploys an empty dashboard.
        parquet=$(find "$out/data" -type f -name '*.parquet' 2>/dev/null | wc -l | tr -d ' ' || true)
        if [ "$parquet" -eq 0 ]; then
          echo "::error title=dev-prism::No parquet in $OUTPUT_DIR/data — collection succeeded but returned no data (empty repo set? no PRs in range?). Refusing to report success on an empty dashboard."
          exit 1
        fi
        echo "::notice title=dev-prism::Site exported to $OUTPUT_DIR/ ($parquet parquet file(s)) — ready to deploy."
