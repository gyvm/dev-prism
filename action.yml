name: PR Weekly Report
description: Generate weekly GitHub PR insights (DORA, timelines, AI summaries) as a static HTML report.
author: gyvm

inputs:
  repositories:
    description: Target repositories as space/comma-separated "owner/name" or "owner/*" entries.
    required: true
  timezone:
    description: IANA timezone for week boundaries (e.g. Asia/Tokyo).
    required: false
    default: UTC
  model:
    description: Copilot SDK model ID for AI analyses. Optional; defaults to the SDK default.
    required: false
  week:
    description: Target week as YYYY-MM-DD (any date in the desired Monday-start week). Omit for the most recent completed week.
    required: false
  skip-ai:
    description: Set to "true" to skip all AI skill analyses.
    required: false
    default: "false"
  github-token:
    description: PAT with Pull requests read access. Mapped to GITHUB_TOKEN.
    required: true
  copilot-token:
    description: PAT with Copilot Requests read access for AI analyses. Optional; if absent, AI skills are skipped.
    required: false

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: "24"

    - name: Install runtime dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci --omit=dev --ignore-scripts

    - name: Generate weekly report
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        COPILOT_GITHUB_TOKEN: ${{ inputs.copilot-token }}
        ACTION_PATH: ${{ github.action_path }}
        INPUT_REPOSITORIES: ${{ inputs.repositories }}
        INPUT_TIMEZONE: ${{ inputs.timezone }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_WEEK: ${{ inputs.week }}
        INPUT_SKIP_AI: ${{ inputs.skip-ai }}
      run: |
        set -euo pipefail
        args=(run --repositories "$INPUT_REPOSITORIES" --skills "$ACTION_PATH/skills")
        if [[ -n "$INPUT_TIMEZONE" ]]; then
          args+=(--timezone "$INPUT_TIMEZONE")
        fi
        if [[ -n "$INPUT_MODEL" ]]; then
          args+=(--model "$INPUT_MODEL")
        fi
        if [[ -n "$INPUT_WEEK" ]]; then
          args+=(--week "$INPUT_WEEK")
        fi
        if [[ "$INPUT_SKIP_AI" == "true" ]]; then
          args+=(--skip-ai)
        fi
        node "$ACTION_PATH/dist/cli.js" "${args[@]}"

branding:
  icon: bar-chart-2
  color: blue
