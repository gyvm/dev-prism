name: Weekly Report

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dashboard-deploy
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Validate required secrets
        env:
          GITHUB_TOKEN_SECRET: ${{ secrets.GH_INSIGHTS_TOKEN }}
        run: |
          if [[ -z "$GITHUB_TOKEN_SECRET" ]]; then
            echo "::error::GH_INSIGHTS_TOKEN must be configured in Settings > Secrets and variables > Actions"
            exit 1
          fi

      - name: Generate weekly report
        uses: ./
        with:
          skip-ai: ${{ secrets.COPILOT_GITHUB_TOKEN == '' && 'true' || 'false' }}
          github-token: ${{ secrets.GH_INSIGHTS_TOKEN }}
          copilot-token: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: Commit data to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ dist/reports/
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: update report data ($(TZ=Asia/Tokyo date +%Y-%m-%d))"
            git push
          fi

      - name: Check if GitHub Pages is enabled
        id: pages-check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          http_status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/pages")
          case "$http_status" in
            200|201)
              echo "pages_enabled=true" >> "$GITHUB_OUTPUT"
              echo "Pages: enabled"
              ;;
            404)
              echo "pages_enabled=false" >> "$GITHUB_OUTPUT"
              echo "Pages: not configured"
              ;;
            *)
              echo "::error::Unexpected response from GitHub Pages API: HTTP $http_status"
              exit 1
              ;;
          esac

      - uses: actions/configure-pages@v6
        if: steps.pages-check.outputs.pages_enabled == 'true'

      - uses: actions/upload-pages-artifact@v4
        if: steps.pages-check.outputs.pages_enabled == 'true'
        with:
          path: dist

      - id: deployment
        if: steps.pages-check.outputs.pages_enabled == 'true'
        uses: actions/deploy-pages@v5
