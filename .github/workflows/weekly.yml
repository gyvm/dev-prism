name: Weekly Report

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dashboard-deploy
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          if [[ -n "$GITHUB_TOKEN_SECRET" ]]; then
            echo "Using GITHUB_TOKEN authentication"
          elif [[ -n "$GITHUB_APP_ID" && -n "$GITHUB_APP_PRIVATE_KEY" && -n "$GITHUB_APP_INSTALLATION_ID" ]]; then
            echo "Using GitHub App authentication"
          else
            echo "::error::Either GITHUB_TOKEN or all three GITHUB_APP_ID, GITHUB_APP_PRIVATE_KEY, and GITHUB_APP_INSTALLATION_ID must be configured in Settings > Secrets and variables > Actions"
            exit 1
          fi
        env:
          GITHUB_TOKEN_SECRET: ${{ secrets.DEV_PRISM_GH_TOKEN }}
          GITHUB_APP_ID: ${{ secrets.GITHUB_APP_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
          GITHUB_APP_INSTALLATION_ID: ${{ secrets.GITHUB_APP_INSTALLATION_ID }}

      # Persist the DWH across runs WITHOUT committing PR data to the repo: the
      # collection cursor self-heals from it, so each week is an incremental
      # collect rather than a full rebuild. A unique key always saves a fresh
      # cache; restore-keys pulls the most recent one. (A >7-day gap evicts it,
      # which just falls back to a full LOOKBACK_DAYS load — still correct.)
      - name: Restore DWH cache
        uses: actions/cache@v4
        with:
          path: data/dwh
          key: dwh-${{ github.run_id }}
          restore-keys: |
            dwh-

      - name: Build DWH and dashboard
        run: |
          npm run dwh:build -- --dwh-dir data/dwh
          npm run explore:data -- --dwh-dir data/dwh
          npm run web:build
        env:
          GITHUB_TOKEN: ${{ secrets.DEV_PRISM_GH_TOKEN }}
          GITHUB_APP_ID: ${{ secrets.GITHUB_APP_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
          GITHUB_APP_INSTALLATION_ID: ${{ secrets.GITHUB_APP_INSTALLATION_ID }}

      - name: Check if GitHub Pages is enabled
        id: pages-check
        run: |
          http_status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/pages")
          case "$http_status" in
            200|201)
              echo "pages_enabled=true" >> "$GITHUB_OUTPUT"
              echo "Pages: enabled"
              ;;
            404)
              echo "pages_enabled=false" >> "$GITHUB_OUTPUT"
              echo "Pages: not configured"
              ;;
            *)
              echo "::error::Unexpected response from GitHub Pages API: HTTP $http_status"
              exit 1
              ;;
          esac
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - uses: actions/configure-pages@v6
        if: steps.pages-check.outputs.pages_enabled == 'true'

      - uses: actions/upload-pages-artifact@v4
        if: steps.pages-check.outputs.pages_enabled == 'true'
        with:
          path: dist

      - id: deployment
        if: steps.pages-check.outputs.pages_enabled == 'true'
        uses: actions/deploy-pages@v5
