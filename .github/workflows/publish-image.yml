# Publishes the collect-&-build Docker action image to GHCR on each release tag,
# so consumers can pull a prebuilt image instead of rebuilding it every run.
# Triggered by the full-semver tags the Release workflow pushes (release.yml);
# the floating major tag (v0/v1) is intentionally NOT matched so moving it does
# not rebuild. To use the prebuilt image, flip action.yml's image to
#   docker://ghcr.io/<owner>/<repo>:0   (matches the floating :0 tag below)
name: Publish image

on:
  push:
    tags:
      # Full semver only (v0.1.0). Excludes the floating major tag (v0).
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # QEMU emulates arm64 so a single runner can build both arches; npm then
      # resolves the per-arch duckdb prebuilt inside each platform's build.
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            # metadata-action suppresses {{major}} while in 0.x, so publish a
            # floating :0 explicitly. This is the stable major ref to pin from
            # action.yml (docker://...:0) during the v0 line.
            type=raw,value=0,enable=${{ startsWith(github.ref_name, 'v0.') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
