name: 'PR Insights — Build Dashboard Site'
description: >-
  Build the static dashboard (Explore + Reports gallery) into dist/ from a
  committed DWH. Pairs with the data-collection action; run it after the DWH is
  refreshed, then deploy dist/ to GitHub Pages / Cloudflare / any static host.
author: 'dev-prism'
branding:
  icon: 'bar-chart-2'
  color: 'purple'

inputs:
  dwh-dir:
    description: 'Committed DWH parquet directory, relative to the repo root.'
    required: false
    default: 'data/dwh'
  base:
    description: >-
      Astro base path. "/" for a custom domain or Cloudflare Pages; "/<repo>/"
      for a GitHub Pages project page (otherwise every asset 404s).
    required: false
    default: '/'
  site:
    description: 'Absolute site URL for canonical/OG links (optional).'
    required: false
    default: ''
  output-dir:
    description: 'Where to write the built site in the consumer workspace.'
    required: false
    default: 'dist'
  reports-config:
    description: 'Path to reports.toml; when set, frozen reports populate the gallery.'
    required: false
    default: ''

# Composite (not Docker): a Docker action's build context is its own directory,
# so it could not reach the engine src. A composite action is checked out whole
# at $GITHUB_ACTION_PATH, giving the build access to the engine source and the
# astro toolchain on the runner.
# Note: this runs in the caller's job and sets its Node version to 24. Run it as
# the last build step before deploy if your job has other Node-version needs.
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        # Cache against the engine's lockfile, not the consumer repo's.
        cache-dependency-path: ${{ github.action_path }}/package-lock.json

    # Full install (NOT --omit=dev): the site build needs astro, esbuild, react
    # and tailwind, all devDependencies. Assumes a linux-x64/arm64 glibc runner
    # (matches the duckdb prebuilt; GitHub-hosted ubuntu qualifies).
    - run: npm ci
      shell: bash
      working-directory: ${{ github.action_path }}

    # Copy the consumer's committed parquet into the site's public dir.
    - run: npm run explore:data -- --dwh-dir "$GITHUB_WORKSPACE/${{ inputs.dwh-dir }}"
      shell: bash
      working-directory: ${{ github.action_path }}

    # Optional: render frozen reports so the gallery is populated.
    - if: ${{ inputs.reports-config != '' }}
      run: >-
        npm run report:dwh --
        --reports-config "$GITHUB_WORKSPACE/${{ inputs.reports-config }}"
        --dwh-dir "$GITHUB_WORKSPACE/${{ inputs.dwh-dir }}"
        --reports-dir dist/reports
      shell: bash
      working-directory: ${{ github.action_path }}

    # Build the Astro site directly (the web:build npm script hardcodes a base,
    # so we invoke astro with the caller's base/site instead).
    - run: |
        npm run build:nav
        ./node_modules/.bin/astro build --root src/web
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        ASTRO_BASE: ${{ inputs.base }}
        ASTRO_SITE: ${{ inputs.site }}

    # Hand the built site back to the consumer workspace (dist/. copies the
    # contents, avoiding a dist/dist nesting).
    - run: |
        mkdir -p "$GITHUB_WORKSPACE/${{ inputs.output-dir }}"
        cp -r dist/. "$GITHUB_WORKSPACE/${{ inputs.output-dir }}/"
      shell: bash
      working-directory: ${{ github.action_path }}
